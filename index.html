    <!-- Bootstrap 5.3 JS Bundle -->

    <script>
        function carregarSite(url, elementoClicado) {
            // Evita que a página recarregue ao clicar
            if (event) event.preventDefault(); 
            
            const iframe = document.getElementById('janelaDoAluno');

            // Caso o aluno não tenha link ou seja '#' ou vazio, exibe uma tela amigável
            if (!url || url === '#' || url.trim() === '') {
                iframe.srcdoc = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; font-family:sans-serif; background:#f8f9fa; color:#6c757d;">
                        <h2 style="margin-bottom:10px;">🚧 Projeto em Desenvolvimento</h2>
                        <p>O link para este portfólio ainda não foi adicionado.</p>
                    </div>`;
            } else {
                // Remove o srcdoc anterior (se houver) e define a nova URL
                iframe.removeAttribute('srcdoc');
                iframe.src = url;
            }

            // Gerencia o destaque visual (cor acesa) do aluno selecionado
            const links = document.querySelectorAll('.nav-link');
            links.forEach(link => link.classList.remove('active'));
            if (elementoClicado) {
                elementoClicado.classList.add('active');
            }
        }
    </script>
